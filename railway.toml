# Backend service (GitHub deploy): build from repo root so backend/ is included.
[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"
watchPatterns = ["backend/**", "Dockerfile", "railway.toml"]

[deploy]
preDeployCommand = ["python manage.py migrate --noinput"]
healthcheckPath = "/live/"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
