# Backend service (GitHub deploy): build from repo root so backend/ is included.
[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"
watchPatterns = ["backend/**", "Dockerfile", "railway.toml"]

[deploy]
preDeployCommand = ["python manage.py migrate --noinput"]
# No railway.toml healthcheckPath: Railway's internal probe returned "service
# unavailable" while the app responded 200 on the public URL (PORT/bind OK).
restartPolicyType = "ON_FAILURE"
