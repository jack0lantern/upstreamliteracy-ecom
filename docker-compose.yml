services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: upstream_ecom
      POSTGRES_USER: upstream
      POSTGRES_PASSWORD: upstream
    ports: ["5433:5432"]  # Use 5433 to avoid conflict with local PostgreSQL on 5432
    volumes: [pgdata:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U upstream -d upstream_ecom"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports: ["6380:6379"]  # Use 6380 to avoid conflict with local Redis on 6379
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
    command: python manage.py runserver 0.0.0.0:8000
    ports: ["8001:8000"]  # Use 8001 to avoid conflict with local Rails on 8000
    volumes:
      - ./backend:/app
      - media_data:/app/media
    env_file: .env
    environment:
      DATABASE_URL: postgres://upstream:upstream@postgres:5432/upstream_ecom
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    command: npm run dev -- --host 0.0.0.0
    ports: ["5199:5173"]
    volumes:
      - ./frontend:/app
      - /app/node_modules
    env_file: .env
    depends_on:
      - backend

volumes:
  pgdata:
  media_data:
